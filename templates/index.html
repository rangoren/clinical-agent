<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Assistant</title>
    <style>
        :root {
            --bg: #eef3f1;
            --bg-accent: #dce8e2;
            --surface: rgba(255, 255, 255, 0.84);
            --surface-strong: #ffffff;
            --surface-soft: #f5f8f7;
            --line: rgba(29, 58, 52, 0.12);
            --line-strong: rgba(29, 58, 52, 0.2);
            --text: #142521;
            --muted: #617570;
            --brand: #0f766e;
            --brand-strong: #0b5f59;
            --brand-soft: #d8f1ec;
            --assistant: #f8fbfa;
            --user: linear-gradient(135deg, #0f766e 0%, #136f63 100%);
            --warning: #fff3d8;
            --warning-line: #f3d08b;
            --danger: #b42318;
            --danger-soft: #fdecec;
            --success-soft: #e7f6ef;
            --shadow: 0 22px 60px rgba(20, 37, 33, 0.12);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 28rem),
                radial-gradient(circle at top right, rgba(57, 116, 96, 0.12), transparent 24rem),
                linear-gradient(180deg, var(--bg) 0%, #f7faf9 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 14px;
        }

        .app-shell {
            width: min(100%, 980px);
            min-height: calc(100vh - 28px);
            min-height: calc(100dvh - 28px);
            display: grid;
            grid-template-rows: auto 1fr auto;
            border: 1px solid rgba(255, 255, 255, 0.65);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow);
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }

        .app-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(255, 255, 255, 0.28), transparent 32%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 26%);
            pointer-events: none;
        }

        .topbar {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 20px 18px 16px;
            border-bottom: 1px solid var(--line);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 16rem),
                linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.62));
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0;
            min-width: 0;
        }

        .brand-text {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-kicker {
            display: block;
            align-self: flex-start;
            padding: 0;
            color: var(--brand-strong);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-title {
            margin: 0;
            font-size: 1.08rem;
            font-weight: 720;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .topbar-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex-shrink: 0;
            min-width: 0;
        }

        .topbar-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        .mode-switch {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--line);
        }

        .mode-button {
            border: none;
            background: transparent;
            color: var(--muted);
            padding: 8px 12px;
            border-radius: 999px;
            font: inherit;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .mode-button.active {
            background: rgba(15, 118, 110, 0.14);
            color: var(--brand-strong);
        }

        .version-stamp {
            flex-shrink: 0;
            min-height: 42px;
            padding: 9px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            display: inline-flex;
            align-items: center;
        }

        .settings-shell {
            position: relative;
            display: none;
            flex-shrink: 0;
        }

        .settings-shell.visible {
            display: inline-flex;
        }

        .settings-trigger {
            width: 42px;
            height: 42px;
            padding: 0;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--brand-strong);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
        }

        .settings-trigger:hover {
            background: rgba(15, 118, 110, 0.08);
        }

        .settings-trigger svg {
            width: 18px;
            height: 18px;
        }

        .settings-panel {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 248px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid var(--line);
            box-shadow: 0 18px 48px rgba(20, 37, 33, 0.14);
            backdrop-filter: blur(16px);
            z-index: 20;
        }

        .settings-panel.open {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .settings-label {
            color: var(--muted);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .calendar-label {
            color: var(--text);
            font-size: 0.84rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .calendar-copy {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .calendar-action {
            border: none;
            border-radius: 12px;
            background: rgba(15, 118, 110, 0.14);
            color: var(--brand-strong);
            padding: 9px 12px;
            font: inherit;
            font-size: 0.76rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 14px;
            gap: 12px;
        }

        .session-banner {
            display: none;
            border-radius: var(--radius-md);
            padding: 16px;
            background: var(--warning);
            border: 1px solid var(--warning-line);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .session-banner p {
            margin: 0;
            color: #745108;
            font-size: 0.94rem;
            line-height: 1.45;
        }

        .session-banner-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .chat-panel {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 6px 4px 18px;
            scroll-behavior: smooth;
        }

        .chat-panel::-webkit-scrollbar {
            width: 10px;
        }

        .chat-panel::-webkit-scrollbar-thumb {
            background: rgba(20, 37, 33, 0.14);
            border-radius: 999px;
        }

        .message-row {
            display: flex;
            margin-bottom: 14px;
        }

        .message-row.assistant {
            justify-content: flex-start;
        }

        .message-row.user {
            justify-content: flex-start;
        }

        .message-stack {
            max-width: min(100%, 760px);
            width: min(100%, 760px);
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
            animation: riseIn 180ms ease-out;
            padding: 8px 0 10px;
            border-radius: 0;
            border: none;
            background: transparent;
            box-shadow: none;
        }

        .message-frame {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            min-width: 0;
        }

        .avatar {
            min-width: 30px;
            height: 30px;
            padding: 0 7px;
            flex-shrink: 0;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.56rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            border: 1px solid rgba(29, 58, 52, 0.1);
            color: var(--brand-strong);
            background: rgba(255, 255, 255, 0.82);
            white-space: nowrap;
        }

        .assistant-avatar {
            background: linear-gradient(135deg, #e6f6f2 0%, #ffffff 100%);
        }

        .user-avatar {
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.18) 0%, rgba(255, 255, 255, 0.96) 100%);
        }

        .bubble {
            max-width: 100%;
            min-width: 0;
            border-radius: 0;
            padding: 10px 14px;
            line-height: 1.58;
            font-size: 0.95rem;
            word-break: break-word;
            overflow-wrap: anywhere;
            border: 1px solid rgba(29, 58, 52, 0.08);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(20, 37, 33, 0.03);
        }

        .bubble p {
            margin: 0;
        }

        .bubble p + p {
            margin-top: 12px;
        }

        .bubble ul {
            margin: 10px 0 0;
            padding-left: 1.1rem;
        }

        .bubble li {
            margin: 0;
            padding-left: 0.1rem;
        }

        .bubble li + li {
            margin-top: 8px;
        }

        .bubble strong,
        .bubble b {
            font-weight: 700;
        }

        .message-row.user .bubble {
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            border-color: rgba(29, 58, 52, 0.08);
        }

        .message-row.assistant .bubble {
            background: rgba(255, 255, 255, 0.72);
            border-color: rgba(29, 58, 52, 0.08);
        }

        .bubble.system {
            background: var(--surface-soft);
        }

        .bubble.error {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: rgba(180, 35, 24, 0.18);
        }

        .bubble.thinking {
            min-width: 112px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .thinking-dots {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.72);
            animation: pulseDot 1s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 120ms;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 240ms;
        }

        .utility-card,
        .feedback-card,
        .sources-card {
            align-self: flex-start;
            max-width: min(100%, 760px);
            border-radius: 16px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.78);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            animation: riseIn 180ms ease-out;
        }

        .utility-card {
            background: var(--success-soft);
            border-color: rgba(16, 129, 88, 0.15);
        }

        .sources-card {
            display: block;
            background: rgba(245, 248, 247, 0.95);
            margin-top: 10px;
        }

        .feedback-card {
            margin-bottom: 2px;
        }

        .utility-text,
        .feedback-text,
        .sources-title {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text);
        }

        .draft-card {
            align-self: flex-start;
            max-width: min(100%, 760px);
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(15, 118, 110, 0.14);
            background: rgba(232, 247, 243, 0.78);
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: riseIn 180ms ease-out;
        }

        .draft-title {
            margin: 0;
            font-size: 0.98rem;
            font-weight: 700;
            color: var(--text);
        }

        .draft-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .draft-conflicts {
            margin: 0;
            padding-left: 1rem;
            color: var(--text);
            font-size: 0.88rem;
        }

        .draft-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .draft-inline-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(15, 118, 110, 0.05);
            border: 1px solid rgba(15, 118, 110, 0.08);
        }

        .draft-inline-copy {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .draft-inline-label {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .draft-inline-value {
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .draft-change-button {
            border: none;
            background: transparent;
            color: var(--brand-strong);
            font: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            padding: 0;
        }

        .draft-calendar-picker {
            display: none;
            padding: 10px 12px;
            border-radius: 14px;
            background: var(--surface-soft);
            border: 1px solid var(--line);
        }

        .draft-calendar-picker.visible {
            display: block;
        }

        .draft-calendar-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            color: var(--text);
            font-size: 0.88rem;
        }

        .draft-calendar-note {
            color: var(--muted);
            font-size: 0.78rem;
        }

        .sources-title {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .source-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-top: 10px;
            border-top: 1px solid var(--line);
        }

        .source-item:first-child {
            border-top: none;
            padding-top: 0;
        }

        .source-meta {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--brand);
            font-weight: 700;
        }

        .source-link {
            color: var(--brand-strong);
            text-decoration: none;
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .source-text {
            color: var(--text);
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }

        .feedback-actions,
        .utility-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .composer-shell {
            position: relative;
            z-index: 1;
            padding: 12px 14px 14px;
            background: linear-gradient(180deg, rgba(247, 250, 249, 0), rgba(247, 250, 249, 0.96) 34%);
        }

        .composer-card {
            width: 100%;
            border-radius: 26px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 16px 36px rgba(20, 37, 33, 0.08);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .composer-main {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            min-width: 0;
            width: 100%;
        }

        .composer-input {
            flex: 1;
            width: 100%;
            min-width: 0;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font: inherit;
            font-size: 0.98rem;
            line-height: 1.45;
            min-height: 54px;
            max-height: 180px;
            padding: 10px 10px 8px;
        }

        .composer-input::placeholder {
            color: #92a39f;
        }

        .primary-button,
        .secondary-button,
        .ghost-button,
        .small-button {
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease, opacity 120ms ease;
            font: inherit;
        }

        .primary-button:active,
        .secondary-button:active,
        .ghost-button:active,
        .small-button:active {
            transform: translateY(1px);
        }

        .primary-button {
            border-radius: 18px;
            padding: 14px 16px;
            min-width: 64px;
            background: var(--user);
            color: white;
            font-weight: 700;
            box-shadow: 0 12px 28px rgba(15, 118, 110, 0.24);
        }

        .primary-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }

        .secondary-button,
        .ghost-button,
        .small-button {
            border-radius: 14px;
            padding: 10px 13px;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .secondary-button {
            background: white;
            color: var(--brand-strong);
            border: 1px solid rgba(15, 118, 110, 0.16);
        }

        .ghost-button {
            background: rgba(255, 255, 255, 0.65);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .small-button {
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .small-button.selected-up {
            background: #dff5ea;
            border-color: #85d5ae;
            color: #0f6b47;
        }

        .small-button.selected-down {
            background: #fdeaea;
            border-color: #f0a8a8;
            color: #a23232;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseDot {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.35;
            }
            40% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        @media (min-width: 820px) {
            body {
                padding: 24px;
            }

            .app-shell {
                min-height: calc(100vh - 48px);
            }

            .topbar {
                padding: 22px 24px 18px;
            }

            .topbar-meta {
                min-width: 0;
            }

            .content {
                padding: 18px 20px;
            }

            .chat-panel {
                padding: 10px 10px 26px;
            }

            .composer-shell {
                padding: 14px 20px 18px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 0;
            }

            .app-shell {
                width: 100vw;
                max-width: 100vw;
                min-height: 100vh;
                min-height: 100dvh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: calc(env(safe-area-inset-top, 0px) + 8px) 10px 10px;
            }

            .brand {
                gap: 0;
                min-width: 0;
            }

            .brand-kicker {
                font-size: 0.62rem;
            }

            .brand-title {
                font-size: 0.88rem;
                line-height: 1.1;
            }

            .content {
                padding: 6px 8px 0;
                min-height: 0;
            }

            .chat-panel {
                padding: 4px 0 14px;
            }

            .message-row {
                margin-bottom: 12px;
            }

            .message-stack {
                width: 100%;
                padding: 8px 0 10px;
            }

            .message-frame {
                gap: 8px;
            }

            .avatar {
                min-width: 26px;
                height: 26px;
                padding: 0 5px;
                border-radius: 7px;
                font-size: 0.46rem;
            }

            .bubble {
                padding: 8px 11px;
                font-size: 0.9rem;
                border-radius: 0;
            }

            .bubble ul {
                padding-left: 1rem;
            }

            .composer-shell {
                padding: 6px 6px calc(env(safe-area-inset-bottom, 0px) + 6px);
            }

            .composer-card {
                border-radius: 18px;
                padding: 4px;
                gap: 0;
            }

            .composer-main {
                gap: 4px;
                display: grid;
                grid-template-columns: minmax(0, 1fr) 42px;
                align-items: end;
            }

            .composer-input {
                min-height: 38px;
                font-size: 16px;
                padding: 6px 6px 4px;
            }

            .primary-button {
                width: 42px;
                min-width: 42px;
                height: 42px;
                padding: 0;
                border-radius: 12px;
                font-size: 0;
                flex: 0 0 auto;
                display: inline-grid;
                place-items: center;
            }

            .primary-button::before {
                content: "\2191";
                font-size: 1rem;
                line-height: 1;
                font-weight: 700;
            }

            .utility-card,
            .feedback-card,
            .sources-card {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
                max-width: 100%;
            }

            .sources-card {
                padding: 10px 12px;
                margin-top: 8px;
            }

            .sources-title {
                font-size: 0.84rem;
                margin-bottom: 8px;
            }

            .sources-list {
                gap: 8px;
            }

            .source-item {
                gap: 5px;
                padding-top: 8px;
            }

            .source-meta {
                font-size: 0.64rem;
                letter-spacing: 0.05em;
            }

            .source-link,
            .source-text {
                font-size: 0.88rem;
                line-height: 1.4;
                overflow-wrap: anywhere;
            }

            .feedback-actions,
            .utility-actions,
            .session-banner-actions {
                width: 100%;
            }

            .feedback-actions button,
            .utility-actions button,
            .session-banner-actions button {
                flex: 1;
            }

            .topbar-meta {
                width: 100%;
                min-width: 0;
                gap: 8px;
                align-items: center;
                justify-content: space-between;
            }

            .topbar-row {
                width: 100%;
                justify-content: space-between;
                gap: 8px;
            }

            .settings-trigger {
                width: 38px;
                height: 38px;
            }

            .settings-panel {
                right: 0;
                left: auto;
                min-width: 220px;
            }

            .version-stamp {
                min-height: 34px;
                padding: 6px 8px;
                font-size: 0.68rem;
            }

            .mode-switch {
                padding: 3px;
            }

            .mode-button {
                padding: 7px 10px;
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-text">
                    <div class="brand-kicker">Built for Dr. Goren</div>
                    <h1 class="brand-title">OB-GYN Resident Support</h1>
                </div>
            </div>
            <div class="topbar-meta">
                <div class="topbar-row">
                    <div class="mode-switch" role="tablist" aria-label="Assistant mode">
                        <button id="mode-clinical" class="mode-button active" onclick="switchAppMode('clinical')">Clinical</button>
                        <button id="mode-scheduling" class="mode-button" onclick="switchAppMode('scheduling')">Scheduling</button>
                    </div>
                    <div class="version-stamp">{{ app_version }}</div>
                    <div id="settings-shell" class="settings-shell">
                        <button
                            id="settings-trigger"
                            class="settings-trigger"
                            type="button"
                            aria-label="Scheduling settings"
                            aria-expanded="false"
                            onclick="toggleSettingsMenu(event)"
                        >
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="12" cy="12" r="3.2"></circle>
                                <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a1.2 1.2 0 0 1 0 1.7l-1.3 1.3a1.2 1.2 0 0 1-1.7 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a1.2 1.2 0 0 1-1.2 1.2h-1.8A1.2 1.2 0 0 1 10.7 20v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a1.2 1.2 0 0 1-1.7 0l-1.3-1.3a1.2 1.2 0 0 1 0-1.7l.1-.1A1 1 0 0 0 6.2 15a1 1 0 0 0-.9-.6H5a1.2 1.2 0 0 1-1.2-1.2v-1.8A1.2 1.2 0 0 1 5 10.2h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a1.2 1.2 0 0 1 0-1.7l1.3-1.3a1.2 1.2 0 0 1 1.7 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a1.2 1.2 0 0 1 1.2-1.2h1.8A1.2 1.2 0 0 1 14.9 4v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a1.2 1.2 0 0 1 1.7 0l1.3 1.3a1.2 1.2 0 0 1 0 1.7l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6h.2a1.2 1.2 0 0 1 1.2 1.2v1.8a1.2 1.2 0 0 1-1.2 1.2h-.2a1 1 0 0 0-.9.6z"></path>
                            </svg>
                        </button>
                        <div id="settings-panel" class="settings-panel" role="menu" aria-label="Scheduling settings">
                            <div class="settings-section">
                                <span class="settings-label">Calendar Sync</span>
                                <div class="calendar-copy">
                                    <span id="calendar-label" class="calendar-label">Calendar Sync: Not connected</span>
                                </div>
                            </div>
                            <button id="calendar-action" class="calendar-action" onclick="toggleGoogleCalendarConnection()">Connect Google</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <section class="content">
            <div id="session-banner" class="session-banner">
                <p id="session-banner-text"></p>
                <div id="session-banner-actions" class="session-banner-actions"></div>
            </div>

            <section id="chat" class="chat-panel" aria-live="polite"></section>
        </section>

        <footer class="composer-shell">
            <div class="composer-card">
                <div class="composer-main">
                    <textarea id="input" class="composer-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-button" class="primary-button" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </footer>
    </main>

    <script>
        let sessionId = localStorage.getItem("session_id");
        let chatReady = false;
        let appMode = "clinical";
        let googleCalendarConnected = false;

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("session_id", sessionId);
        }

        function autoResizeInput() {
            const input = document.getElementById("input");
            input.style.height = "auto";
            input.style.height = Math.min(input.scrollHeight, 180) + "px";
        }

        function scrollChatToBottom() {
            const chat = document.getElementById("chat");
            chat.scrollTop = chat.scrollHeight;
        }

        function setStatus(_text) {}

        function closeSettingsMenu() {
            const panel = document.getElementById("settings-panel");
            const trigger = document.getElementById("settings-trigger");
            if (!panel || !trigger) return;
            panel.classList.remove("open");
            trigger.setAttribute("aria-expanded", "false");
        }

        function toggleSettingsMenu(event) {
            event.stopPropagation();
            const panel = document.getElementById("settings-panel");
            const trigger = document.getElementById("settings-trigger");
            if (!panel || !trigger) return;
            const nextOpen = !panel.classList.contains("open");
            panel.classList.toggle("open", nextOpen);
            trigger.setAttribute("aria-expanded", nextOpen ? "true" : "false");
        }

        function renderModeState() {
            document.getElementById("mode-clinical").classList.toggle("active", appMode === "clinical");
            document.getElementById("mode-scheduling").classList.toggle("active", appMode === "scheduling");
            document.getElementById("settings-shell").classList.toggle("visible", appMode === "scheduling");
            if (appMode !== "scheduling") {
                closeSettingsMenu();
            }
        }

        function updateCalendarUi(status) {
            const label = document.getElementById("calendar-label");
            const action = document.getElementById("calendar-action");
            if (appMode !== "scheduling") return;

            if (!status || status.available === false) {
                googleCalendarConnected = false;
                label.textContent = "Calendar Sync: Unavailable";
                action.textContent = "Setup required";
                action.disabled = true;
                return;
            }

            googleCalendarConnected = !!status.connected;
            action.disabled = false;
            if (status.connected) {
                label.textContent = "Calendar Sync: Connected";
                action.textContent = "Disconnect";
            } else {
                label.textContent = "Calendar Sync: Not connected";
                action.textContent = "Connect Google";
            }
        }

        async function refreshCalendarStatus() {
            if (appMode !== "scheduling") return;
            try {
                const response = await fetch("/calendar/status", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        provider: "google"
                    })
                });
                const data = await response.json();
                updateCalendarUi(data);
            } catch (_error) {
                updateCalendarUi({ connected: false, available: false });
            }
        }

        async function toggleGoogleCalendarConnection() {
            if (appMode !== "scheduling") return;
            if (googleCalendarConnected) {
                try {
                    const response = await fetch("/calendar/disconnect/google", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            session_id: sessionId
                        })
                    });
                    const data = await response.json();
                    appendAssistantMessage(data.reply || "Google Calendar disconnected.", "system");
                    closeSettingsMenu();
                    await refreshCalendarStatus();
                } catch (error) {
                    appendAssistantMessage("Error: " + error, "error");
                }
                return;
            }

            try {
                const response = await fetch("/calendar/connect/google", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });
                const data = await response.json();
                if (data.auth_url) {
                    closeSettingsMenu();
                    window.location.href = data.auth_url;
                    return;
                }
                appendAssistantMessage(data.reply || "Google Calendar is not configured yet.", "system");
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
            }
        }

        function handleCalendarCallbackStatus() {
            const params = new URLSearchParams(window.location.search);
            const calendarStatus = params.get("calendar_status");
            if (!calendarStatus) return;

            if (calendarStatus === "connected") {
                appendAssistantMessage("Google Calendar is connected. New scheduling changes can sync there now.", "system");
            } else if (calendarStatus === "error") {
                appendAssistantMessage("Google Calendar connection didn’t complete.", "error");
            }

            window.history.replaceState({}, document.title, window.location.pathname);
        }

        document.addEventListener("click", (event) => {
            const shell = document.getElementById("settings-shell");
            if (!shell || !shell.classList.contains("visible")) return;
            if (!shell.contains(event.target)) {
                closeSettingsMenu();
            }
        });

        function switchAppMode(nextMode) {
            if (appMode === nextMode) return;
            appMode = nextMode;
            renderModeState();
            document.getElementById("chat").innerHTML = "";
            hideSessionBanner();
            appendAssistantMessage(
                appMode === "scheduling"
                    ? "Scheduling is on."
                    : "Clinical Assistant is active."
            );
            bootstrapSession();
        }

        function setComposerEnabled(enabled) {
            const input = document.getElementById("input");
            const sendButton = document.getElementById("send-button");
            input.disabled = !enabled;
            sendButton.disabled = !enabled;
            chatReady = enabled;
        }

        function createMessageRow(role, html, variant = "") {
            const row = document.createElement("div");
            row.className = `message-row ${role}`;

            const stack = document.createElement("div");
            stack.className = "message-stack";

            const bubble = document.createElement("div");
            bubble.className = "bubble" + (variant ? ` ${variant}` : "");
            bubble.innerHTML = html;

            const frame = document.createElement("div");
            frame.className = "message-frame";

            const avatar = document.createElement("div");
            avatar.className = `avatar ${role === "user" ? "user-avatar" : "assistant-avatar"}`;
            avatar.textContent = role === "user" ? "You" : "Assistant";

            frame.appendChild(avatar);
            frame.appendChild(bubble);

            stack.appendChild(frame);
            row.appendChild(stack);
            return row;
        }

        function appendMessage(role, html, variant = "") {
            if (!html) return null;
            const chat = document.getElementById("chat");
            const row = createMessageRow(role, html, variant);
            chat.appendChild(row);
            scrollChatToBottom();
            return row;
        }

        function appendAssistantMessage(message, variant = "") {
            return appendMessage("assistant", message, variant);
        }

        function appendUserMessage(message) {
            return appendMessage("user", escapeHtml(message));
        }

        function appendUtilityCard(text, undoType) {
            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "utility-card";
            card.innerHTML = `
                <p class="utility-text">${text}</p>
                <div class="utility-actions">
                    <button class="secondary-button" onclick="undoSavedItem()">${undoType ? "Undo" : "Dismiss"}</button>
                </div>
            `;
            chat.appendChild(card);
            scrollChatToBottom();
        }

        function appendSuggestedSaveCard(suggestedSave) {
            if (!suggestedSave || !suggestedSave.message) return;

            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "utility-card";

            const text = document.createElement("p");
            text.className = "utility-text";
            text.textContent = "Save this for future responses?";

            const actions = document.createElement("div");
            actions.className = "utility-actions";

            const saveButton = document.createElement("button");
            saveButton.className = "secondary-button";
            saveButton.textContent = suggestedSave.label || "Save";
            saveButton.addEventListener("click", () => saveSuggestedItem(suggestedSave.message, card));

            const dismissButton = document.createElement("button");
            dismissButton.className = "ghost-button";
            dismissButton.textContent = "Dismiss";
            dismissButton.addEventListener("click", () => card.remove());

            actions.appendChild(saveButton);
            actions.appendChild(dismissButton);
            card.appendChild(text);
            card.appendChild(actions);
            chat.appendChild(card);
            scrollChatToBottom();
        }

        function appendSchedulingDraftCard(draft) {
            if (!draft || !draft.draft_id) return;

            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "draft-card";
            const actionType = draft.action_type || "create";
            const confirmLabel = actionType === "delete"
                ? "Delete event"
                : actionType === "update"
                ? "Update event"
                : actionType === "bulk_create"
                ? "Create events"
                : actionType === "bulk_delete"
                ? "Delete events"
                : "Create event";

            const title = document.createElement("p");
            title.className = "draft-title";
            title.textContent = draft.title || "Draft event";

            const summaryCalendarName = draft.selected_calendar
                ? (draft.selected_calendar.is_primary ? "Primary" : (draft.selected_calendar.name || "Primary"))
                : "Primary";

            const meta = document.createElement("div");
            meta.className = "draft-meta";
            const calendarMetaId = `draft-calendar-meta-${draft.draft_id}`;
            meta.innerHTML = `
                ${draft.target_summary ? `<div>Current: ${escapeHtml(draft.target_summary)}</div>` : ""}
                ${draft.event_count ? `<div>Events: ${escapeHtml(String(draft.event_count))}</div>` : ""}
                <div>Calendar: <span id="${escapeHtml(calendarMetaId)}">${escapeHtml(summaryCalendarName)}</span></div>
                <div>Time: ${escapeHtml(draft.start_at || "")}${draft.end_at ? ` - ${escapeHtml(draft.end_at)}` : ""}</div>
                ${draft.duration_label ? `<div>Duration: ${escapeHtml(draft.duration_label)}</div>` : ""}
                ${draft.location ? `<div>Location: ${escapeHtml(draft.location)}</div>` : ""}
            `;

            card.appendChild(title);
            card.appendChild(meta);

            let selectedCalendarId = draft.selected_calendar ? draft.selected_calendar.provider_calendar_id : null;
            let selectedCalendarName = draft.selected_calendar ? draft.selected_calendar.name : "";
            if (draft.available_calendars && draft.available_calendars.length) {
                const calendarRow = document.createElement("div");
                calendarRow.className = "draft-inline-row";

                const calendarCopy = document.createElement("div");
                calendarCopy.className = "draft-inline-copy";

                const calendarLabel = document.createElement("div");
                calendarLabel.className = "draft-inline-label";
                calendarLabel.textContent = "Save to";

                const calendarValue = document.createElement("div");
                calendarValue.className = "draft-inline-value";
                calendarValue.textContent = selectedCalendarName || "Primary";

                calendarCopy.appendChild(calendarLabel);
                calendarCopy.appendChild(calendarValue);

                calendarRow.appendChild(calendarCopy);

                if (draft.available_calendars.length > 1) {
                    const changeButton = document.createElement("button");
                    changeButton.type = "button";
                    changeButton.className = "draft-change-button";
                    changeButton.textContent = "Change";
                    calendarRow.appendChild(changeButton);

                    const picker = document.createElement("div");
                    picker.className = "draft-calendar-picker";

                    draft.available_calendars.forEach((calendar, index) => {
                        const option = document.createElement("label");
                        option.className = "draft-calendar-option";

                        const radio = document.createElement("input");
                        radio.type = "radio";
                        radio.name = `calendar-${draft.draft_id}`;
                        radio.value = calendar.provider_calendar_id || "";
                        radio.checked = radio.value === selectedCalendarId;
                        radio.addEventListener("change", () => {
                            selectedCalendarId = calendar.provider_calendar_id || null;
                            selectedCalendarName = calendar.is_primary ? "Primary" : (calendar.name || "Calendar");
                            calendarValue.textContent = selectedCalendarName;
                            const calendarMetaValue = document.getElementById(calendarMetaId);
                            if (calendarMetaValue) {
                                calendarMetaValue.textContent = selectedCalendarName;
                            }
                            confirmButton.textContent = actionType === "bulk_create"
                                ? `Create in ${selectedCalendarName}`
                                : actionType === "update"
                                ? `Update in ${selectedCalendarName}`
                                : actionType === "delete"
                                ? `Delete from ${selectedCalendarName}`
                                : actionType === "bulk_delete"
                                ? `Delete from ${selectedCalendarName}`
                                : `Create in ${selectedCalendarName}`;
                        });

                        const textWrap = document.createElement("div");
                        const mainText = document.createElement("div");
                        mainText.textContent = calendar.is_primary ? "Primary" : (calendar.name || "Calendar");
                        const noteText = document.createElement("div");
                        noteText.className = "draft-calendar-note";
                        noteText.textContent = calendar.is_primary ? "Main calendar" : "Secondary calendar";

                        textWrap.appendChild(mainText);
                        textWrap.appendChild(noteText);

                        option.appendChild(radio);
                        option.appendChild(textWrap);
                        picker.appendChild(option);

                        if (!selectedCalendarId && index === 0) {
                            selectedCalendarId = calendar.provider_calendar_id || null;
                            selectedCalendarName = calendar.is_primary ? "Primary" : (calendar.name || "Calendar");
                            calendarValue.textContent = selectedCalendarName;
                        }
                    });

                    changeButton.addEventListener("click", () => {
                        picker.classList.toggle("visible");
                    });

                    card.appendChild(calendarRow);
                    card.appendChild(picker);
                } else {
                    card.appendChild(calendarRow);
                }
            }

            if (draft.conflicts && draft.conflicts.length) {
                const conflictsTitle = document.createElement("p");
                conflictsTitle.className = "utility-text";
                conflictsTitle.textContent = `Conflicts found: ${draft.conflicts.length}`;
                card.appendChild(conflictsTitle);

                const conflictList = document.createElement("ul");
                conflictList.className = "draft-conflicts";
                draft.conflicts.forEach((conflict) => {
                    const item = document.createElement("li");
                    item.textContent = `${conflict.title} · ${conflict.start_at}${conflict.event_start_at ? ` · overlaps ${conflict.event_start_at}` : ""}`;
                    conflictList.appendChild(item);
                });
                card.appendChild(conflictList);
            }

            const actions = document.createElement("div");
            actions.className = "draft-actions";

            const confirmButton = document.createElement("button");
            confirmButton.className = "secondary-button";
            confirmButton.textContent = selectedCalendarName
                ? (
                    actionType === "bulk_create"
                        ? `Create in ${selectedCalendarName}`
                        : actionType === "update"
                        ? `Update in ${selectedCalendarName}`
                        : actionType === "delete"
                        ? `Delete from ${selectedCalendarName}`
                        : actionType === "bulk_delete"
                        ? `Delete from ${selectedCalendarName}`
                        : `Create in ${selectedCalendarName}`
                )
                : confirmLabel;
            confirmButton.addEventListener("click", () => confirmSchedulingDraft(draft.draft_id, card, selectedCalendarId));

            const dismissButton = document.createElement("button");
            dismissButton.className = "ghost-button";
            dismissButton.textContent = "Dismiss";
            dismissButton.addEventListener("click", () => dismissSchedulingDraft(draft.draft_id, card));

            actions.appendChild(confirmButton);
            actions.appendChild(dismissButton);
            card.appendChild(actions);
            chat.appendChild(card);
            scrollChatToBottom();
        }

        function appendFeedbackCard(messageId) {
            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "feedback-card";
            card.id = `feedback-${messageId}`;
            card.innerHTML = `
                <p class="feedback-text">Was this reply useful?</p>
                <div class="feedback-actions">
                    <button id="up-${messageId}" class="small-button" onclick="sendFeedback('${messageId}', 'up')">Useful</button>
                    <button id="down-${messageId}" class="small-button" onclick="sendFeedback('${messageId}', 'down')">Off</button>
                </div>
            `;
            chat.appendChild(card);
            scrollChatToBottom();
        }

        function appendSourcesCard(sources) {
            if (!sources || !sources.length) return;

            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "sources-card";

            const itemsHtml = sources.map((source) => `
                <div class="source-item">
                    <div class="source-meta">${escapeHtml(source.source_type)} · ${escapeHtml(source.source_id)}${source.updated_at ? ` · Updated ${escapeHtml(source.updated_at)}` : ""}</div>
                    ${source.url
                        ? `<a class="source-link" href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.title)}</a>`
                        : `<div class="source-text">${escapeHtml(source.title)}</div>`
                    }
                </div>
            `).join("");

            card.className = "sources-card";
            card.innerHTML = `
                <p class="sources-title">Sources used</p>
                <div class="sources-list">${itemsHtml}</div>
            `;

            chat.appendChild(card);
            scrollChatToBottom();
        }

        function escapeHtml(value) {
            const div = document.createElement("div");
            div.textContent = value;
            return div.innerHTML;
        }

        function hideSessionBanner() {
            document.getElementById("session-banner").style.display = "none";
            document.getElementById("session-banner-text").textContent = "";
            document.getElementById("session-banner-actions").innerHTML = "";
        }

        function showSessionBanner(text, actionsHtml) {
            document.getElementById("session-banner-text").textContent = text;
            document.getElementById("session-banner-actions").innerHTML = actionsHtml;
            document.getElementById("session-banner").style.display = "block";
        }

        async function saveSuggestedItem(message, card) {
            try {
                const response = await fetch("/message", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                if (card) card.remove();
                appendAssistantMessage(data.reply);

                if (data.undo) {
                    const label = data.undo_type === "protocol"
                        ? "Saved as protocol."
                        : data.undo_type === "knowledge"
                        ? "Saved in knowledge."
                        : "Saved for future responses.";
                    appendUtilityCard(label, data.undo_type);
                }
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
                setStatus("Error");
            }
        }

        function setThinkingState(active) {
            const existing = document.getElementById("thinking-row");
            if (!active) {
                if (existing) existing.remove();
                setStatus(chatReady ? "Ready" : "Waiting");
                return;
            }

            if (existing) return;
            const row = createMessageRow(
                "assistant",
                `<div class="thinking-dots"><span></span><span></span><span></span></div><span>Thinking</span>`,
                "system thinking"
            );
            row.id = "thinking-row";
            document.getElementById("chat").appendChild(row);
            scrollChatToBottom();
            setStatus("Thinking");
        }

        async function bootstrapSession() {
            setComposerEnabled(false);
            setStatus("Checking");

            try {
                const response = await fetch("/session-state", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        app_mode: appMode
                    })
                });

                const data = await response.json();

                if (data.state === "new_onboarding") {
                    appendAssistantMessage(data.reply);
                    hideSessionBanner();
                    setComposerEnabled(true);
                    return;
                }

                if (data.state === "incomplete_onboarding") {
                    showSessionBanner(
                        "You didn’t finish onboarding last time.",
                        `
                            <button class="secondary-button" onclick="continueOnboarding()">Continue onboarding</button>
                            <button class="ghost-button" onclick="startChatMode()">Chat mode</button>
                        `
                    );
                    return;
                }

                hideSessionBanner();
                if (data.reply) {
                    appendAssistantMessage(data.reply);
                }
                await refreshCalendarStatus();
                setComposerEnabled(true);
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
                setComposerEnabled(true);
                setStatus("Error");
            }
        }

        async function continueOnboarding() {
            setStatus("Resuming");

            try {
                const response = await fetch("/continue-onboarding", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                hideSessionBanner();
                appendAssistantMessage(data.reply);
                setComposerEnabled(true);
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
                setComposerEnabled(true);
                setStatus("Error");
            }
        }

        async function startChatMode() {
            setStatus("Resetting");

            try {
                const response = await fetch("/chat-mode", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                document.getElementById("chat").innerHTML = "";
                hideSessionBanner();
                appendAssistantMessage(data.reply);
                setComposerEnabled(true);
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
                setComposerEnabled(true);
                setStatus("Error");
            }
        }

        async function sendMessage() {
            if (!chatReady) return;

            const input = document.getElementById("input");
            const message = input.value.trim();
            if (!message) return;

            appendUserMessage(message);
            input.value = "";
            autoResizeInput();
            setThinkingState(true);

            try {
                const response = await fetch("/message", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        app_mode: appMode
                    })
                });

                const data = await response.json();

                setThinkingState(false);
                appendAssistantMessage(data.reply);

                if (data.undo) {
                    const label = data.undo_type === "protocol"
                        ? "Saved as protocol."
                        : data.undo_type === "knowledge"
                        ? "Saved in knowledge."
                        : "Saved for future responses.";

                    appendUtilityCard(label, data.undo_type);
                }

                if (data.show_feedback && data.assistant_message_id) {
                    appendFeedbackCard(data.assistant_message_id);
                }

                if (data.sources && data.sources.length) {
                    appendSourcesCard(data.sources);
                }

                if (data.suggested_save) {
                    appendSuggestedSaveCard(data.suggested_save);
                }

                if (data.scheduling_draft) {
                    appendSchedulingDraftCard(data.scheduling_draft);
                }
            } catch (error) {
                setThinkingState(false);
                appendAssistantMessage("Error: " + error, "error");
                setStatus("Error");
            }
        }

        async function undoSavedItem() {
            try {
                const response = await fetch("/undo", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (data.status === "undone protocol") {
                    appendAssistantMessage("Last saved protocol removed.", "system");
                } else if (data.status === "undone knowledge") {
                    appendAssistantMessage("Last saved knowledge item removed.", "system");
                } else if (data.status === "undone principle") {
                    appendAssistantMessage("Last saved principle removed.", "system");
                } else if (data.status === "nothing to undo") {
                    appendAssistantMessage("Nothing to undo.", "system");
                } else {
                    appendAssistantMessage("Error: " + data.status, "error");
                }
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
            }
        }

        async function confirmSchedulingDraft(draftId, card, selectedCalendarId = null) {
            try {
                const response = await fetch("/scheduling/confirm", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        draft_id: draftId,
                        selected_calendar_id: selectedCalendarId
                    })
                });
                const data = await response.json();
                if (card) card.remove();
                appendAssistantMessage(data.reply || "Draft confirmed.");
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
            }
        }

        async function dismissSchedulingDraft(draftId, card) {
            try {
                const response = await fetch("/scheduling/dismiss", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        draft_id: draftId
                    })
                });
                const data = await response.json();
                if (card) card.remove();
                appendAssistantMessage(data.reply || "Draft dismissed.", "system");
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
            }
        }

        async function sendFeedback(messageId, direction) {
            const upBtn = document.getElementById(`up-${messageId}`);
            const downBtn = document.getElementById(`down-${messageId}`);

            try {
                const response = await fetch("/feedback", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message_id: messageId,
                        direction: direction
                    })
                });

                const data = await response.json();

                if (data.status === "marked useful") {
                    upBtn.classList.add("selected-up");
                    downBtn.disabled = true;
                } else if (data.status === "marked off") {
                    downBtn.classList.add("selected-down");
                    upBtn.disabled = true;
                } else {
                    appendAssistantMessage("Error: " + data.status, "error");
                }
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
            }
        }

        document.getElementById("input").addEventListener("input", autoResizeInput);
        document.getElementById("input").addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        renderModeState();
        autoResizeInput();
        handleCalendarCallbackStatus();
        bootstrapSession();
    </script>
</body>
</html>
