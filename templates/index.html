<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Assistant</title>
    <style>
        :root {
            --bg: #eef3f1;
            --bg-accent: #dce8e2;
            --surface: rgba(255, 255, 255, 0.84);
            --surface-strong: #ffffff;
            --surface-soft: #f5f8f7;
            --line: rgba(29, 58, 52, 0.12);
            --line-strong: rgba(29, 58, 52, 0.2);
            --text: #142521;
            --muted: #617570;
            --brand: #0f766e;
            --brand-strong: #0b5f59;
            --brand-soft: #d8f1ec;
            --assistant: #f8fbfa;
            --user: linear-gradient(135deg, #0f766e 0%, #136f63 100%);
            --warning: #fff3d8;
            --warning-line: #f3d08b;
            --danger: #b42318;
            --danger-soft: #fdecec;
            --success-soft: #e7f6ef;
            --shadow: 0 22px 60px rgba(20, 37, 33, 0.12);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 28rem),
                radial-gradient(circle at top right, rgba(57, 116, 96, 0.12), transparent 24rem),
                linear-gradient(180deg, var(--bg) 0%, #f7faf9 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 14px;
        }

        .app-shell {
            width: min(100%, 980px);
            min-height: calc(100vh - 28px);
            min-height: calc(100dvh - 28px);
            display: grid;
            grid-template-rows: auto 1fr auto;
            border: 1px solid rgba(255, 255, 255, 0.65);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow);
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }

        .app-shell::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(255, 255, 255, 0.28), transparent 32%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 26%);
            pointer-events: none;
        }

        .topbar {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 18px 14px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.54));
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-badge {
            min-width: 44px;
            height: 44px;
            padding: 0 14px;
            border-radius: 15px;
            background: linear-gradient(135deg, #0f766e 0%, #0a5c56 100%);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.22);
        }

        .brand-text {
            min-width: 0;
        }

        .brand-title {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .brand-subtitle {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 0.84rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-pill {
            flex-shrink: 0;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .version-stamp {
            flex-shrink: 0;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 14px;
            gap: 12px;
        }

        .session-banner {
            display: none;
            border-radius: var(--radius-md);
            padding: 16px;
            background: var(--warning);
            border: 1px solid var(--warning-line);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .session-banner p {
            margin: 0;
            color: #745108;
            font-size: 0.94rem;
            line-height: 1.45;
        }

        .session-banner-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .chat-panel {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 6px 4px 18px;
            scroll-behavior: smooth;
        }

        .chat-panel::-webkit-scrollbar {
            width: 10px;
        }

        .chat-panel::-webkit-scrollbar-thumb {
            background: rgba(20, 37, 33, 0.14);
            border-radius: 999px;
        }

        .message-row {
            display: flex;
            margin-bottom: 14px;
        }

        .message-row.assistant {
            justify-content: flex-start;
        }

        .message-row.user {
            justify-content: flex-start;
        }

        .message-stack {
            max-width: min(100%, 760px);
            width: min(100%, 760px);
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: riseIn 180ms ease-out;
        }

        .message-frame {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            min-width: 0;
        }

        .avatar {
            min-width: 34px;
            height: 34px;
            padding: 0 8px;
            flex-shrink: 0;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            border: 1px solid var(--line);
            color: var(--brand-strong);
            background: rgba(255, 255, 255, 0.94);
            white-space: nowrap;
        }

        .assistant-avatar {
            background: linear-gradient(135deg, #e6f6f2 0%, #ffffff 100%);
        }

        .user-avatar {
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.18) 0%, rgba(255, 255, 255, 0.96) 100%);
        }

        .message-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 6px;
        }

        .bubble {
            max-width: 100%;
            min-width: 0;
            border-radius: 24px;
            padding: 14px 15px;
            line-height: 1.55;
            font-size: 0.96rem;
            word-break: break-word;
            overflow-wrap: anywhere;
            border: 1px solid var(--line);
            background: var(--assistant);
            color: var(--text);
        }

        .bubble p {
            margin: 0;
        }

        .bubble p + p {
            margin-top: 12px;
        }

        .bubble ul {
            margin: 10px 0 0;
            padding-left: 1.1rem;
        }

        .bubble li {
            margin: 0;
            padding-left: 0.1rem;
        }

        .bubble li + li {
            margin-top: 8px;
        }

        .bubble strong,
        .bubble b {
            font-weight: 700;
        }

        .message-row.user .bubble {
            background: var(--user);
            border-color: transparent;
            color: white;
            border-bottom-left-radius: 10px;
            box-shadow: 0 16px 32px rgba(15, 118, 110, 0.18);
        }

        .message-row.assistant .bubble {
            background: rgba(255, 255, 255, 0.88);
            border-bottom-left-radius: 10px;
        }

        .bubble.system {
            background: var(--surface-soft);
        }

        .bubble.error {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: rgba(180, 35, 24, 0.18);
        }

        .bubble.thinking {
            min-width: 112px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .thinking-dots {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.72);
            animation: pulseDot 1s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 120ms;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 240ms;
        }

        .utility-card,
        .feedback-card,
        .sources-card {
            align-self: flex-start;
            max-width: min(100%, 760px);
            border-radius: 18px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.78);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            animation: riseIn 180ms ease-out;
        }

        .utility-card {
            background: var(--success-soft);
            border-color: rgba(16, 129, 88, 0.15);
        }

        .sources-card {
            display: block;
            background: rgba(245, 248, 247, 0.95);
        }

        .utility-text,
        .feedback-text,
        .sources-title {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text);
        }

        .sources-title {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .source-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-top: 10px;
            border-top: 1px solid var(--line);
        }

        .source-item:first-child {
            border-top: none;
            padding-top: 0;
        }

        .source-meta {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--brand);
            font-weight: 700;
        }

        .source-link {
            color: var(--brand-strong);
            text-decoration: none;
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .source-text {
            color: var(--text);
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }

        .feedback-actions,
        .utility-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .composer-shell {
            position: relative;
            z-index: 1;
            padding: 12px 14px 14px;
            background: linear-gradient(180deg, rgba(247, 250, 249, 0), rgba(247, 250, 249, 0.96) 34%);
        }

        .composer-card {
            width: 100%;
            border-radius: 26px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 16px 36px rgba(20, 37, 33, 0.08);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .composer-main {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            min-width: 0;
            width: 100%;
        }

        .composer-input {
            flex: 1;
            width: 100%;
            min-width: 0;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font: inherit;
            font-size: 0.98rem;
            line-height: 1.45;
            min-height: 54px;
            max-height: 180px;
            padding: 10px 10px 8px;
        }

        .composer-input::placeholder {
            color: #92a39f;
        }

        .primary-button,
        .secondary-button,
        .ghost-button,
        .small-button {
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease, opacity 120ms ease;
            font: inherit;
        }

        .primary-button:active,
        .secondary-button:active,
        .ghost-button:active,
        .small-button:active {
            transform: translateY(1px);
        }

        .primary-button {
            border-radius: 18px;
            padding: 14px 16px;
            min-width: 64px;
            background: var(--user);
            color: white;
            font-weight: 700;
            box-shadow: 0 12px 28px rgba(15, 118, 110, 0.24);
        }

        .primary-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
        }

        .secondary-button,
        .ghost-button,
        .small-button {
            border-radius: 14px;
            padding: 10px 13px;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .secondary-button {
            background: white;
            color: var(--brand-strong);
            border: 1px solid rgba(15, 118, 110, 0.16);
        }

        .ghost-button {
            background: rgba(255, 255, 255, 0.65);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .small-button {
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .small-button.selected-up {
            background: #dff5ea;
            border-color: #85d5ae;
            color: #0f6b47;
        }

        .small-button.selected-down {
            background: #fdeaea;
            border-color: #f0a8a8;
            color: #a23232;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseDot {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.35;
            }
            40% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        @media (min-width: 820px) {
            body {
                padding: 24px;
            }

            .app-shell {
                min-height: calc(100vh - 48px);
            }

            .topbar {
                padding: 22px 24px 18px;
            }

            .content {
                padding: 18px 20px;
            }

            .chat-panel {
                padding: 10px 10px 26px;
            }

            .composer-shell {
                padding: 14px 20px 18px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 0;
            }

            .app-shell {
                width: 100vw;
                max-width: 100vw;
                min-height: 100vh;
                min-height: 100dvh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            .topbar {
                gap: 8px;
                padding: calc(env(safe-area-inset-top, 0px) + 6px) 10px 8px;
            }

            .brand {
                gap: 8px;
                min-width: 0;
            }

            .brand-badge {
                min-width: 32px;
                height: 32px;
                padding: 0 10px;
                border-radius: 11px;
                font-size: 0.62rem;
            }

            .brand-title {
                font-size: 0.8rem;
                line-height: 1.1;
            }

            .brand-subtitle {
                display: none;
            }

            .content {
                padding: 6px 8px 0;
                min-height: 0;
            }

            .chat-panel {
                padding: 4px 0 14px;
            }

            .message-row {
                margin-bottom: 12px;
            }

            .message-stack {
                width: 100%;
            }

            .message-frame {
                gap: 8px;
            }

            .avatar {
                min-width: 28px;
                height: 28px;
                padding: 0 6px;
                border-radius: 10px;
                font-size: 0.56rem;
            }

            .message-label {
                font-size: 0.64rem;
                padding: 0 2px;
            }

            .bubble {
                padding: 12px 13px;
                font-size: 0.91rem;
                border-radius: 20px;
            }

            .bubble ul {
                padding-left: 1rem;
            }

            .composer-shell {
                padding: 6px 6px calc(env(safe-area-inset-bottom, 0px) + 6px);
            }

            .composer-card {
                border-radius: 18px;
                padding: 4px;
                gap: 0;
            }

            .composer-main {
                gap: 4px;
                display: grid;
                grid-template-columns: minmax(0, 1fr) 42px;
                align-items: end;
            }

            .composer-input {
                min-height: 38px;
                font-size: 16px;
                padding: 6px 6px 4px;
            }

            .primary-button {
                width: 42px;
                min-width: 42px;
                height: 42px;
                padding: 0;
                border-radius: 12px;
                font-size: 0;
                flex: 0 0 auto;
                display: inline-grid;
                place-items: center;
            }

            .primary-button::before {
                content: "\2191";
                font-size: 1rem;
                line-height: 1;
                font-weight: 700;
            }

            .utility-card,
            .feedback-card {
                flex-direction: column;
                align-items: stretch;
            }

            .feedback-actions,
            .utility-actions,
            .session-banner-actions {
                width: 100%;
            }

            .feedback-actions button,
            .utility-actions button,
            .session-banner-actions button {
                flex: 1;
            }

            .status-pill {
                display: none;
            }

            .topbar-meta {
                gap: 0;
            }

            .version-stamp {
                padding: 6px 8px;
                font-size: 0.68rem;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-badge">Doctor Goren</div>
                <div class="brand-text">
                    <h1 class="brand-title">OB-GYN Clinical Assistant</h1>
                    <p class="brand-subtitle">A focused clinical study and decision-support assistant for OB-GYN.</p>
                </div>
            </div>
            <div class="topbar-meta">
                <div class="version-stamp">{{ app_version }}</div>
                <div id="status-pill" class="status-pill">Connecting</div>
            </div>
        </header>

        <section class="content">
            <div id="session-banner" class="session-banner">
                <p id="session-banner-text"></p>
                <div id="session-banner-actions" class="session-banner-actions"></div>
            </div>

            <section id="chat" class="chat-panel" aria-live="polite"></section>
        </section>

        <footer class="composer-shell">
            <div class="composer-card">
                <div class="composer-main">
                    <textarea id="input" class="composer-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-button" class="primary-button" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </footer>
    </main>

    <script>
        let sessionId = localStorage.getItem("session_id");
        let chatReady = false;

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("session_id", sessionId);
        }

        function autoResizeInput() {
            const input = document.getElementById("input");
            input.style.height = "auto";
            input.style.height = Math.min(input.scrollHeight, 180) + "px";
        }

        function scrollChatToBottom() {
            const chat = document.getElementById("chat");
            chat.scrollTop = chat.scrollHeight;
        }

        function setStatus(text) {
            document.getElementById("status-pill").textContent = text;
        }

        function setComposerEnabled(enabled) {
            const input = document.getElementById("input");
            const sendButton = document.getElementById("send-button");
            input.disabled = !enabled;
            sendButton.disabled = !enabled;
            chatReady = enabled;
            setStatus(enabled ? "Ready" : "Waiting");
        }

        function createMessageRow(role, html, variant = "") {
            const row = document.createElement("div");
            row.className = `message-row ${role}`;

            const stack = document.createElement("div");
            stack.className = "message-stack";

            const label = document.createElement("div");
            label.className = "message-label";
            label.textContent = role === "user" ? "You" : "Assistant";

            const bubble = document.createElement("div");
            bubble.className = "bubble" + (variant ? ` ${variant}` : "");
            bubble.innerHTML = html;

            const frame = document.createElement("div");
            frame.className = "message-frame";

            const avatar = document.createElement("div");
            avatar.className = `avatar ${role === "user" ? "user-avatar" : "assistant-avatar"}`;
            avatar.textContent = role === "user" ? "You" : "Dr AI";

            frame.appendChild(avatar);
            frame.appendChild(bubble);

            stack.appendChild(label);
            stack.appendChild(frame);
            row.appendChild(stack);
            return row;
        }

        function appendMessage(role, html, variant = "") {
            if (!html) return null;
            const chat = document.getElementById("chat");
            const row = createMessageRow(role, html, variant);
            chat.appendChild(row);
            scrollChatToBottom();
            return row;
        }

        function appendAssistantMessage(message, variant = "") {
            return appendMessage("assistant", message, variant);
        }

        function appendUserMessage(message) {
            return appendMessage("user", escapeHtml(message));
        }

        function appendUtilityCard(text, undoType) {
            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "utility-card";
            card.innerHTML = `
                <p class="utility-text">${text}</p>
                <div class="utility-actions">
                    <button class="secondary-button" onclick="undoSavedItem()">${undoType ? "Undo" : "Dismiss"}</button>
                </div>
            `;
            chat.appendChild(card);
            scrollChatToBottom();
        }

        function appendFeedbackCard(messageId) {
            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "feedback-card";
            card.id = `feedback-${messageId}`;
            card.innerHTML = `
                <p class="feedback-text">Was this reply useful?</p>
                <div class="feedback-actions">
                    <button id="up-${messageId}" class="small-button" onclick="sendFeedback('${messageId}', 'up')">Useful</button>
                    <button id="down-${messageId}" class="small-button" onclick="sendFeedback('${messageId}', 'down')">Off</button>
                </div>
            `;
            chat.appendChild(card);
            scrollChatToBottom();
        }

        function appendSourcesCard(sources) {
            if (!sources || !sources.length) return;

            const chat = document.getElementById("chat");
            const card = document.createElement("div");
            card.className = "sources-card";

            const itemsHtml = sources.map((source) => `
                <div class="source-item">
                    <div class="source-meta">${escapeHtml(source.source_type)} · ${escapeHtml(source.source_id)}</div>
                    ${source.url
                        ? `<a class="source-link" href="${escapeHtml(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.title)}</a>`
                        : `<div class="source-text">${escapeHtml(source.title)}</div>`
                    }
                </div>
            `).join("");

            card.className = "sources-card";
            card.innerHTML = `
                <p class="sources-title">Sources used</p>
                <div class="sources-list">${itemsHtml}</div>
            `;

            chat.appendChild(card);
            scrollChatToBottom();
        }

        function escapeHtml(value) {
            const div = document.createElement("div");
            div.textContent = value;
            return div.innerHTML;
        }

        function hideSessionBanner() {
            document.getElementById("session-banner").style.display = "none";
            document.getElementById("session-banner-text").textContent = "";
            document.getElementById("session-banner-actions").innerHTML = "";
        }

        function showSessionBanner(text, actionsHtml) {
            document.getElementById("session-banner-text").textContent = text;
            document.getElementById("session-banner-actions").innerHTML = actionsHtml;
            document.getElementById("session-banner").style.display = "block";
        }

        function setThinkingState(active) {
            const existing = document.getElementById("thinking-row");
            if (!active) {
                if (existing) existing.remove();
                setStatus(chatReady ? "Ready" : "Waiting");
                return;
            }

            if (existing) return;
            const row = createMessageRow(
                "assistant",
                `<div class="thinking-dots"><span></span><span></span><span></span></div><span>Thinking</span>`,
                "system thinking"
            );
            row.id = "thinking-row";
            document.getElementById("chat").appendChild(row);
            scrollChatToBottom();
            setStatus("Thinking");
        }

        async function bootstrapSession() {
            setComposerEnabled(false);
            setStatus("Checking");

            try {
                const response = await fetch("/session-state", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (data.state === "new_onboarding") {
                    appendAssistantMessage(data.reply);
                    hideSessionBanner();
                    setComposerEnabled(true);
                    return;
                }

                if (data.state === "incomplete_onboarding") {
                    showSessionBanner(
                        "You didn’t finish onboarding last time.",
                        `
                            <button class="secondary-button" onclick="continueOnboarding()">Continue onboarding</button>
                            <button class="ghost-button" onclick="startChatMode()">Chat mode</button>
                        `
                    );
                    return;
                }

                hideSessionBanner();
                setComposerEnabled(true);
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
                setComposerEnabled(true);
                setStatus("Error");
            }
        }

        async function continueOnboarding() {
            setStatus("Resuming");

            try {
                const response = await fetch("/continue-onboarding", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                hideSessionBanner();
                appendAssistantMessage(data.reply);
                setComposerEnabled(true);
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
                setComposerEnabled(true);
                setStatus("Error");
            }
        }

        async function startChatMode() {
            setStatus("Resetting");

            try {
                const response = await fetch("/chat-mode", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                document.getElementById("chat").innerHTML = "";
                hideSessionBanner();
                appendAssistantMessage(data.reply);
                setComposerEnabled(true);
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
                setComposerEnabled(true);
                setStatus("Error");
            }
        }

        async function sendMessage() {
            if (!chatReady) return;

            const input = document.getElementById("input");
            const message = input.value.trim();
            if (!message) return;

            appendUserMessage(message);
            input.value = "";
            autoResizeInput();
            setThinkingState(true);

            try {
                const response = await fetch("/message", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                setThinkingState(false);
                appendAssistantMessage(data.reply);

                if (data.undo) {
                    const label = data.undo_type === "protocol"
                        ? "Saved as protocol."
                        : data.undo_type === "knowledge"
                        ? "Saved in knowledge."
                        : "Saved for future responses.";

                    appendUtilityCard(label, data.undo_type);
                }

                if (data.show_feedback && data.assistant_message_id) {
                    appendFeedbackCard(data.assistant_message_id);
                }

                if (data.sources && data.sources.length) {
                    appendSourcesCard(data.sources);
                }
            } catch (error) {
                setThinkingState(false);
                appendAssistantMessage("Error: " + error, "error");
                setStatus("Error");
            }
        }

        async function undoSavedItem() {
            try {
                const response = await fetch("/undo", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (data.status === "undone protocol") {
                    appendAssistantMessage("Last saved protocol removed.", "system");
                } else if (data.status === "undone knowledge") {
                    appendAssistantMessage("Last saved knowledge item removed.", "system");
                } else if (data.status === "undone principle") {
                    appendAssistantMessage("Last saved principle removed.", "system");
                } else if (data.status === "nothing to undo") {
                    appendAssistantMessage("Nothing to undo.", "system");
                } else {
                    appendAssistantMessage("Error: " + data.status, "error");
                }
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
            }
        }

        async function sendFeedback(messageId, direction) {
            const upBtn = document.getElementById(`up-${messageId}`);
            const downBtn = document.getElementById(`down-${messageId}`);

            try {
                const response = await fetch("/feedback", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message_id: messageId,
                        direction: direction
                    })
                });

                const data = await response.json();

                if (data.status === "marked useful") {
                    upBtn.classList.add("selected-up");
                    downBtn.disabled = true;
                } else if (data.status === "marked off") {
                    downBtn.classList.add("selected-down");
                    upBtn.disabled = true;
                } else {
                    appendAssistantMessage("Error: " + data.status, "error");
                }
            } catch (error) {
                appendAssistantMessage("Error: " + error, "error");
            }
        }

        document.getElementById("input").addEventListener("input", autoResizeInput);
        document.getElementById("input").addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        autoResizeInput();
        bootstrapSession();
    </script>
</body>
</html>
